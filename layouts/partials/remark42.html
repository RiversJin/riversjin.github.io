{{ if .Params.comments }}
<section class="comments-section">
  <div class="comments-header">
    <h2 class="comments-title">Discussion</h2>
  </div>
  <div class="comments-shell">
    <div id="utterances"></div>
  </div>
  <script>
    (function(){
      var theme = document.documentElement.getAttribute('data-theme');
      if (!theme) theme = localStorage.getItem('theme');
      if (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches) theme = 'dark';
      var utterTheme = (theme === 'dark') ? 'github-dark' : 'github-light';

      var s = document.createElement('script');
      s.src = 'https://utteranc.es/client.js';
      s.repo = 'RiversJin/riversjin.github.io';
      s.issue-term = 'pathname';
      s.theme = utterTheme;
      s.crossOrigin = 'anonymous';
      s.async = true;
      document.getElementById('utterances').appendChild(s);
    })();
  </script>
</section>
{{ end }}
