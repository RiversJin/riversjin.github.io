baseURL = 'https://riversjin.github.io/'
defaultContentLanguage = 'zh'
locale = 'zh-cn'
title = "RiversJin's Blog"
theme = 'swiss-operator'

[pagination]
pagerSize = 10

[outputs]
home = ['html', 'rss']
section = ['html', 'rss']
taxonomy = ['html', 'rss']

[taxonomies]
tag = "tags"
category = "categories"

[params]
description = "记录系统底层、并发、Rust 相关的技术笔记"
postsPerPage = 10
favicon = "/favicon.svg"

[params.social]
github = "https://github.com/RiversJin"
email = "riversjin1999@gmail.com"
rss = "/index.xml"

[params.theme]
accentBlue = "#0055FF"
accentRed = "#E62B1E"
showRss = true
localFonts = true

[[params.readingPaths]]
title = "Rust 类型系统"
subtitle = "Rust Type System"
color = "#E62B1E"
posts = ["rust-derive-clone", "rust-unsafecell-cpp-mutable", "rust-variance-lifetime"]

[[params.readingPaths]]
title = "并发 / 内存模型"
subtitle = "Concurrency & Memory Model"
color = "#0055FF"
posts = ["atomic-variable", "atomic-variable-demo", "linux-rcu-to-epoch-gc"]

[[params.readingPaths]]
title = "系统底层实践"
subtitle = "Systems Programming"
color = "#5E5E5E"
posts = ["c-cpp-inline-diff", "musl-static-link-cpp", "stackful-coroutine-linux-amd64"]

[params.categories]
colors = { "并发" = "#0055FF", "Rust" = "#E62B1E", "C/C++" = "#000000", "系统底层" = "#5E5E5E" }

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = 'monokai'
  [markup.goldmark.extensions]
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        inline = [['\(', '\)']]
        block = [['$$', '$$'], ['\[', '\]']]

[[menu.main]]
  name = "文章"
  url = "/posts/"
  weight = 1

[[menu.main]]
  name = "分类"
  url = "/categories/"
  weight = 2

[[menu.main]]
  name = "标签"
  url = "/tags/"
  weight = 3
